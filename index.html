    <!-- نظام التحكم والتنقل وحساب البيانات بجافا سكريبت النقي السريع -->
    <script>
        let currentView = 'home';
        let currentCounterType = null;

        function switchView(viewName) {
            currentView = viewName;
            
            // إخفاء كل الواجهات أولاً
            document.getElementById('view-home').classList.add('hidden-view');
            document.getElementById('view-cars').classList.add('hidden-view');
            document.getElementById('view-tickets').classList.add('hidden-view');
            document.getElementById('view-counters').classList.add('hidden-view');
            document.getElementById('view-counter-detail').classList.add('hidden-view');
            document.getElementById('common-header').classList.add('hidden-view');

            if(viewName === 'home') {
                document.getElementById('view-home').classList.remove('hidden-view');
            } else {
                // إظهار الهيدر وتغيير نصوصه وأيقوناته
                document.getElementById('common-header').classList.remove('hidden-view');
                const titleElem = document.getElementById('header-title');
                const iconElem = document.getElementById('header-icon');
                
                iconElem.className = "bi text-xl"; // تنظيف
                
                if(viewName === 'cars') {
                    titleElem.innerText = "توزيع السيارات";
                    iconElem.classList.add('bi-car-front-fill');
                    document.getElementById('view-cars').classList.remove('hidden-view');
                } else if(viewName === 'tickets') {
                    titleElem.innerText = "برنامج التذاكر";
                    iconElem.classList.add('bi-ticket-perforated-fill');
                    document.getElementById('view-tickets').classList.remove('hidden-view');
                } else if(viewName === 'counters') {
                    titleElem.innerText = "برنامج العدادات";
                    iconElem.classList.add('bi-calculator-fill');
                    document.getElementById('view-counters').classList.remove('hidden-view');
                }
            }
        }

        function goBack() {
            if (currentCounterType) {
                // لو كنا في شاشة تفصيلية من العدادات نرجع لـ قائمة العدادات أولاً
                currentCounterType = null;
                document.getElementById('view-counter-detail').classList.add('hidden-view');
                document.getElementById('header-title').innerText = "برنامج العدادات";
                document.getElementById('view-counters').classList.remove('hidden-view');
            } else {
                switchView('home');
            }
        }

        // --- منطق توزيع السيارات الذكي ---
        function calculateCars() {
            let total = parseInt(document.getElementById('carAmount').value);
            if (isNaN(total) || total <= 0) return;

            const prices = { gr: 35, fr: 30, bs: 25, sh: 20, rn: 15, mk: 15, al: 10 };
            const weights = { gr: 0.35, fr: 0.22, sh: 0.13, al: 0.15, rn: 0.08, mk: 0.05, bs: 0.02 };

            let counts = {};
            let currentSum = 0;

            Object.keys(weights).forEach(key => {
                let allocatedMoney = total * weights[key];
                counts[key] = Math.floor(allocatedMoney / prices[key]);
                currentSum += counts[key] * prices[key];
            });

            let diff = total - currentSum;
            const keysPriority = ['gr', 'fr', 'al', 'sh', 'rn', 'mk', 'bs'];
            for (let key of keysPriority) {
                while (diff >= prices[key]) {
                    counts[key]++;
                    diff -= prices[key];
                }
            }

            // عرض النتائج في الـ DOM مباشرة
            document.getElementById('res-car-total').innerText = total + " ج.م";
            document.getElementById('res-gr').innerText = counts.gr;
            document.getElementById('res-fr').innerText = counts.fr;
            document.getElementById('res-sh').innerText = counts.sh;
            document.getElementById('res-al').innerText = counts.al;
            document.getElementById('res-rn').innerText = counts.rn;
            document.getElementById('res-mk').innerText = counts.mk;
            document.getElementById('res-bs').innerText = counts.bs;

            document.getElementById('cars-input-card').classList.add('hidden-view');
            document.getElementById('cars-result-card').classList.remove('hidden-view');
        }

        function resetCars() {
            document.getElementById('carAmount').value = '';
            document.getElementById('cars-result-card').classList.add('hidden-view');
            document.getElementById('cars-input-card').classList.remove('hidden-view');
        }

        // --- منطق توزيع التذاكر المتوازن ---
        function calculateTickets() {
            let aa = parseInt(document.getElementById('ticketAmount').value);
            if (isNaN(aa) || aa <= 0) return;
            
            let a10a = 0, a15a = 0, a25a = 0, a30a = 0, a35a = 0;
            let remaining = aa;
            
            a35a = Math.floor((aa * 0.4) / 35);
            remaining -= a35a * 35;
            a30a = Math.floor((aa * 0.2) / 30);
            remaining -= a30a * 30;
            a25a = Math.floor((aa * 0.15) / 25);
            remaining -= a25a * 25;
            a15a = Math.floor((aa * 0.1) / 15);
            remaining -= a15a * 15;
            a10a = Math.floor(remaining / 10);
            remaining %= 10;

            document.getElementById('res-ticket-total').innerText = (aa - remaining) + " ج.م";
            document.getElementById('t-35').innerText = a35a;
            document.getElementById('t-30').innerText = a30a;
            document.getElementById('t-25').innerText = a25a;
            document.getElementById('t-15').innerText = a15a;
            document.getElementById('t-10').innerText = a10a;

            document.getElementById('tickets-input-card').classList.add('hidden-view');
            document.getElementById('tickets-result-card').classList.remove('hidden-view');
        }

        function resetTickets() {
            document.getElementById('ticketAmount').value = '';
            document.getElementById('tickets-result-card').classList.add('hidden-view');
            document.getElementById('tickets-input-card').classList.remove('hidden-view');
        }

        // --- منطق العدادات والجرد التفصيلي ---
        function openCounterSubView(type) {
            currentCounterType = type;
            document.getElementById('view-counters').classList.add('hidden-view');
            document.getElementById('view-counter-detail').classList.remove('hidden-view');

            // إخفاء المجموعات الثلاثة وتصفير المدخلات السابقة
            document.getElementById('group-money').classList.add('hidden-view');
            document.getElementById('group-cars').classList.add('hidden-view');
            document.getElementById('group-tickets').classList.add('hidden-view');
            
            // تفريغ الحقول القديمة عند فتح شاشة جديدة
            const inputs = document.querySelectorAll('.counter-input');
            inputs.forEach(i => i.value = '');
            
            document.getElementById('counter-total-val').innerText = "0 ج.م";
            document.getElementById('counter-total-count').innerText = "0";

            if (type === 'money') {
                document.getElementById('header-title').innerText = "جرد النقدية";
                document.getElementById('group-money').classList.remove('hidden-view');
                document.getElementById('counter-count-container').classList.add('hidden');
            } else if (type === 'cars') {
                document.getElementById('header-title').innerText = "عداد السيارات";
                document.getElementById('group-cars').classList.remove('hidden-view');
                document.getElementById('counter-count-container').classList.remove('hidden');
            } else if (type === 'tickets') {
                document.getElementById('header-title').innerText = "عداد التذاكر";
                document.getElementById('group-tickets').classList.remove('hidden-view');
                document.getElementById('counter-count-container').classList.remove('hidden');
            }
        }

        function updateCounterTotal(type) {
            let totalMoney = 0;
            let totalCount = 0;
            
            // جلب المدخلات النشطة فقط بناءً على المجموعة المفعلة
            const targetGroup = document.getElementById('group-' + type);
            const inputs = targetGroup.querySelectorAll('.counter-input');

            inputs.forEach(input => {
                let qty = parseInt(input.value) || 0;
                let multiplier = parseInt(input.getAttribute('data-val')) || 0;
                
                totalMoney += (qty * multiplier);
                totalCount += qty;
            });

            document.getElementById('counter-total-val').innerText = totalMoney + " ج.م";
            document.getElementById('counter-total-count').innerText = totalCount;
        }
    </script>
</body>
</html>
