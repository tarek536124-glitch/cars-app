<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة المواقف</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');
        body { font-family: 'Cairo', sans-serif; background: #f8fafc; }
        .main-gradient { background: linear-gradient(135deg, #0f172a 0%, #1e40af 100%); }
        .card-animate { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .tap-effect:active { transform: scale(0.95); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const Icon = ({ name, size = 24, className = "" }) => {
            useEffect(() => { if (window.lucide) lucide.createIcons(); }, [name]);
            return <i data-lucide={name} style={{width: size, height: size}} className={`inline-block ${className}`}></i>;
        };

        const TollApp = () => {
            const [view, setView] = useState('home');
            const [amount, setAmount] = useState('');
            const [result, setResult] = useState(null);
            const [counterType, setCounterType] = useState(null);
            const [counterInputs, setCounterInputs] = useState({});

            const carTypes = [
                { id: 'ml', name: 'ملاكي', price: 10, weight: 0.35 },
                { id: 'mk', name: 'ميكروباص', price: 15, weight: 0.25 },
                { id: 'rn', name: 'ربع نقل', price: 15, weight: 0.15 },
                { id: 'sh', name: 'شيفر', price: 20, weight: 0.12 },
                { id: 'bs', name: 'أوتوبيس', price: 25, weight: 0.06 },
                { id: 'fr', name: 'فردي', price: 30, weight: 0.04 },
                { id: 'gr', name: 'جرار', price: 35, weight: 0.03 }
            ];

            const ticketTypes = [
                { id: 't10', name: 'فئة 10', price: 10, weight: 0.40 },
                { id: 't15', name: 'فئة 15', price: 15, weight: 0.30 },
                { id: 't25', name: 'فئة 25', price: 25, weight: 0.15 },
                { id: 't30', name: 'فئة 30', price: 30, weight: 0.10 },
                { id: 't35', name: 'فئة 35', price: 35, weight: 0.05 }
            ];

            const handleCalculate = () => {
                let total = parseInt(amount);
                if (isNaN(total) || total <= 0) return;

                const categories = view === 'cars' ? carTypes : ticketTypes;
                let counts = {};
                let currentSum = 0;

                // التوزيع الأولي (أعداد صحيحة فقط)
                categories.forEach(cat => {
                    const randomVariation = 0.8 + (Math.random() * 0.4); 
                    let count = Math.floor((total * cat.weight * randomVariation) / cat.price);
                    counts[cat.id] = count;
                    currentSum += count * cat.price;
                });

                // توزيع المتبقي بالكامل لضمان عدم وجود فكة (أعداد صحيحة)
                let remaining = total - currentSum;
                let iterations = 0;
                while (remaining >= 5 && iterations < 100) {
                    const shuffled = [...categories].sort(() => Math.random() - 0.5);
                    for (let cat of shuffled) {
                        if (remaining >= cat.price) {
                            counts[cat.id]++;
                            remaining -= cat.price;
                        }
                    }
                    iterations++;
                }
                
                setResult({ counts, totalActual: total - remaining, remainder: remaining });
            };

            const Header = ({ title, icon, color }) => (
                <div className={`${color} text-white p-6 pt-10 rounded-b-[2.5rem] shadow-lg mb-6 flex items-center justify-between`}>
                    <button onClick={() => {setView('home'); setResult(null); setAmount(''); setCounterType(null);}} className="p-2 bg-white/20 rounded-full tap-effect">
                        <Icon name="arrow-right" />
                    </button>
                    <div className="text-center">
                        <Icon name={icon} size={28} className="mb-1" />
                        <h1 className="text-xl font-bold">{title}</h1>
                    </div>
                    <div className="w-10"></div>
                </div>
            );

            if (view === 'home') {
                return (
                    <div className="max-w-md mx-auto min-h-screen pb-10 card-animate">
                        <div className="main-gradient text-white p-12 rounded-b-[4rem] text-center shadow-2xl mb-10 border-b-4 border-green-400">
                            <div className="w-24 h-24 bg-white/10 backdrop-blur-md rounded-3xl mx-auto mb-6 flex items-center justify-center border border-white/20 shadow-xl rotate-3">
                                <Icon name="wallet" size={48} className="text-whiet-400" />
                            </div>
                            <h2 className="text-4xl font-black mb-2 tracking-tight">مرحباً كابتن مصطفى</h2>
                        </div>

                        <div className="px-6 space-y-5">
                            <button onClick={() => setView('cars')} className="w-full bg-white p-6 rounded-[2rem] shadow-sm flex items-center border-r-8 border-blue-600 tap-effect hover:shadow-md transition-all">
                                <div className="bg-blue-50 p-4 rounded-2xl text-blue-600 ml-5"><Icon name="car" /></div>
                                <div className="text-right">
                                    <div className="text-xl font-black text-gray-800">برنامج السيارات</div>
                                    <div className="text-xs text-gray-400 font-bold">توزيع الإيراد على الفئات</div>
                                </div>
                            </button>

                            <button onClick={() => setView('tickets')} className="w-full bg-white p-6 rounded-[2rem] shadow-sm flex items-center border-r-8 border-emerald-600 tap-effect hover:shadow-md transition-all">
                                <div className="bg-emerald-50 p-4 rounded-2xl text-emerald-600 ml-5"><Icon name="ticket" /></div>
                                <div className="text-right">
                                    <div className="text-xl font-black text-gray-800">برنامج التذاكر</div>
                                    <div className="text-xs text-gray-400 font-bold">حساب فئات التذاكر</div>
                                </div>
                            </button>

                            <button onClick={() => setView('counters')} className="w-full bg-white p-6 rounded-[2rem] shadow-sm flex items-center border-r-8 border-indigo-600 tap-effect hover:shadow-md transition-all">
                                <div className="bg-indigo-50 p-4 rounded-2xl text-indigo-600 ml-5"><Icon name="calculator" /></div>
                                <div className="text-right">
                                    <div className="text-xl font-black text-gray-800">برنامج العدادات</div>
                                    <div className="text-xs text-gray-400 font-bold">جرد النقدية والعدد</div>
                                </div>
                            </button>
                        </div>
                    </div>
                );
            }

            if (view === 'cars' || view === 'tickets') {
                const list = view === 'cars' ? carTypes : ticketTypes;
                return (
                    <div className="max-w-md mx-auto min-h-screen pb-10 card-animate">
                        <Header title={view === 'cars' ? "توزيع السيارات" : "برنامج التذاكر"} icon={view === 'cars' ? "car" : "ticket"} color={view === 'cars' ? "bg-blue-600" : "bg-emerald-600"} />
                        <div className="px-6">
                            {!result ? (
                                <div className="bg-white p-8 rounded-[2.5rem] shadow-xl text-center">
                                    <p className="text-gray-400 font-bold mb-4">أدخل المبلغ الإجمالي</p>
                                    <input type="number" value={amount} onChange={e => setAmount(e.target.value)} className="w-full text-5xl font-black text-center text-gray-800 focus:outline-none mb-8" placeholder="0" autoFocus />
                                    <button onClick={handleCalculate} className={`w-full py-5 rounded-2xl font-black text-xl text-white shadow-lg tap-effect ${view === 'cars' ? 'bg-blue-600' : 'bg-emerald-600'}`}>توزيع الآن</button>
                                </div>
                            ) : (
                                <div className="space-y-3">
                                    <div className="bg-gray-900 text-white p-8 rounded-[2.5rem] text-center mb-6">
                                        <div className="text-xs opacity-50 mb-1">الإجمالي الموزع</div>
                                        <div className="text-5xl font-black">{amount}</div>
                                    </div>
                                    {list.map(type => (
                                        <div key={type.id} className="bg-white p-5 rounded-2xl shadow-sm border border-gray-100 flex justify-between items-center">
                                            <div className="flex items-center gap-4">
                                                <div className="w-10 h-10 bg-gray-50 rounded-xl flex items-center justify-center font-bold text-gray-400 text-xs">{type.price}</div>
                                                <div className="font-black text-gray-700">{type.name}</div>
                                            </div>
                                            <div className="text-3xl font-black text-blue-600">{result.counts[type.id]}</div>
                                        </div>
                                    ))}
                                    <button onClick={() => {setResult(null); setAmount('');}} className="w-full mt-6 bg-gray-200 text-gray-600 py-4 rounded-2xl font-black tap-effect">مبلغ جديد</button>
                                </div>
                            )}
                        </div>
                    </div>
                );
            }

            if (view === 'counters') {
                if (!counterType) {
                    return (
                        <div className="max-w-md mx-auto min-h-screen card-animate">
                            <Header title="العدادات" icon="calculator" color="bg-indigo-600" />
                            <div className="p-6 space-y-4">
                                <button onClick={() => setCounterType('money')} className="w-full bg-white p-6 rounded-[2rem] shadow-sm flex items-center gap-4 border-b-4 border-amber-400 tap-effect">
                                    <Icon name="banknote" className="text-amber-500" /> <span className="font-black text-gray-700 text-xl">جرد النقدية</span>
                                </button>
                                <button onClick={() => setCounterType('cars')} className="w-full bg-white p-6 rounded-[2rem] shadow-sm flex items-center gap-4 border-b-4 border-blue-400 tap-effect">
                                    <Icon name="car" className="text-blue-500" /> <span className="font-black text-gray-700 text-xl">عداد السيارات</span>
                                </button>
                                <button onClick={() => setCounterType('tickets')} className="w-full bg-white p-6 rounded-[2rem] shadow-sm flex items-center gap-4 border-b-4 border-emerald-400 tap-effect">
                                    <Icon name="ticket" className="text-emerald-500" /> <span className="font-black text-gray-700 text-xl">عداد التذاكر</span>
                                </button>
                            </div>
                        </div>
                    );
                }

                const currentList = counterType === 'money' ? [200, 100, 50, 20, 10, 5, 1].map(v => ({id: v, name: `${v} جنيه`, price: v})) : (counterType === 'cars' ? carTypes : ticketTypes);
                let total = 0, count = 0;
                currentList.forEach(item => {
                    total += (counterInputs[item.id] || 0) * item.price;
                    count += (counterInputs[item.id] || 0);
                });

                return (
                    <div className="max-w-md mx-auto min-h-screen pb-24 card-animate">
                        <Header title="العداد الذكي" icon="calculator" color="bg-indigo-600" />
                        <div className="sticky top-4 z-20 mx-6 bg-white/90 backdrop-blur-md p-6 rounded-[2.5rem] shadow-xl border border-white flex justify-between items-center mb-8">
                            <div><div className="text-[10px] text-gray-400 font-black">القيمة الكلية</div><div className="text-3xl font-black text-indigo-600">{total.toLocaleString()}</div></div>
                            {counterType !== 'money' && <div className="bg-indigo-600 text-white px-5 py-2 rounded-2xl text-xl font-black">{count}</div>}
                        </div>
                        <div className="px-6 space-y-3">
                            {currentList.map(item => (
                                <div key={item.id} className="bg-white p-3 pr-6 rounded-2xl shadow-sm flex items-center gap-4 border border-gray-50">
                                    <div className="flex-1 font-black text-gray-700">{item.name}</div>
                                    <input type="number" placeholder="0" onChange={e => setCounterInputs({...counterInputs, [item.id]: parseInt(e.target.value) || 0})} className="w-24 bg-gray-50 p-4 rounded-xl text-center font-black text-xl text-indigo-700 focus:outline-none" />
                                </div>
                            ))}
                            <button onClick={() => setCounterInputs({})} className="w-full mt-6 bg-red-50 text-red-600 py-4 rounded-2xl font-black">تصفير</button>
                        </div>
                    </div>
                );
            }
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<TollApp />);
    </script>
</body>
</html>
